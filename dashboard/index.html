<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shanty Monitor</title>
<style>
  :root {
    --bg:       #0d1117;
    --bg2:      #161b22;
    --bg3:      #21262d;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --blue:     #58a6ff;
    --purple:   #bc8cff;
    --font:     'Courier New', Courier, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 16px;
    color: var(--blue);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #status-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
  }

  #last-update { color: var(--muted); }
  #overall-status { font-weight: bold; }

  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  section { margin-bottom: 32px; }

  section h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ---- Domain grid ---- */
  .domain-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .domain-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .domain-card .domain-name { font-weight: bold; color: var(--blue); }
  .domain-card .domain-meta { font-size: 11px; color: var(--muted); }

  /* ---- Host table ---- */
  .host-table {
    width: 100%;
    border-collapse: collapse;
  }

  .host-table th {
    text-align: left;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .host-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .host-table tr:hover td { background: var(--bg3); }

  .host-row.expanded td { background: var(--bg3); }

  .host-table tr.detail-row td {
    padding: 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-panel {
    background: var(--bg3);
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .detail-section h4 {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .detail-section table { width: 100%; border-collapse: collapse; }
  .detail-section td { padding: 2px 4px; font-size: 12px; }
  .detail-section td:first-child { color: var(--muted); width: 50%; }

  /* ---- Badges / indicators ---- */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: bold;
  }

  .badge-up    { background: #1a3a1f; color: var(--green); }
  .badge-down  { background: #3a1a1a; color: var(--red);   }
  .badge-warn  { background: #3a2d0a; color: var(--yellow);}
  .badge-probe { background: #1a2a3a; color: var(--blue);  }
  .badge-unknown { background: var(--bg3); color: var(--muted); }

  /* ---- Meter bars ---- */
  .meter {
    background: var(--bg);
    border-radius: 3px;
    height: 8px;
    overflow: hidden;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
  }

  .meter-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .meter-low  { background: var(--green);  }
  .meter-mid  { background: var(--yellow); }
  .meter-high { background: var(--red);    }

  /* ---- Sparklines ---- */
  .sparkline { display: inline-block; vertical-align: middle; }

  /* ---- Port dots ---- */
  .port-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 3px;
    cursor: default;
  }

  .port-up   { background: var(--green); }
  .port-down { background: var(--red);   }

  .port-label {
    font-size: 10px;
    color: var(--muted);
    margin-right: 6px;
    cursor: default;
  }

  /* ---- Clickable row ---- */
  .host-name-cell {
    cursor: pointer;
    color: var(--blue);
    user-select: none;
  }

  .host-name-cell:hover { text-decoration: underline; }

  .expand-icon {
    display: inline-block;
    margin-right: 6px;
    transition: transform 0.2s;
    font-style: normal;
    font-size: 10px;
    color: var(--muted);
  }

  .expand-icon.open { transform: rotate(90deg); }

  /* ---- Loading / error ---- */
  #loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 14px;
  }

  #error-banner {
    display: none;
    background: #3a1a1a;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 10px 16px;
    margin-bottom: 16px;
  }

  /* ---- Disk bars ---- */
  .disk-row { margin-bottom: 6px; }
  .disk-path { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .disk-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .disk-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .disk-bar-fill { height: 100%; border-radius: 3px; }
  .disk-pct { font-size: 11px; width: 36px; text-align: right; }

  /* ---- Graph canvas area ---- */
  .graph-wrap { position: relative; }
  .graph-wrap canvas { display: block; }

  /* responsive */
  @media (max-width: 800px) {
    .host-table th.hide-mobile,
    .host-table td.hide-mobile { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>⚓ Shanty Monitor</h1>
  <div id="status-bar">
    <span id="overall-status">Loading...</span>
    <span id="last-update">—</span>
    <span id="refresh-countdown"></span>
  </div>
</header>

<main>
  <div id="error-banner"></div>
  <div id="loading">Loading metrics…</div>
  <div id="content" style="display:none">

    <section id="section-domains">
      <h2>External Domains</h2>
      <div class="domain-grid" id="domain-grid"></div>
    </section>

    <section id="section-agents">
      <h2>Managed Hosts (Agent)</h2>
      <table class="host-table" id="agent-table">
        <thead>
          <tr>
            <th>Host</th>
            <th>Status</th>
            <th>CPU</th>
            <th>Memory</th>
            <th class="hide-mobile">Load</th>
            <th class="hide-mobile">Uptime</th>
            <th>Ports</th>
            <th class="hide-mobile">Ping</th>
            <th class="hide-mobile">CPU History</th>
          </tr>
        </thead>
        <tbody id="agent-tbody"></tbody>
      </table>
    </section>

    <section id="section-probes">
      <h2>Probe-Only Hosts</h2>
      <table class="host-table" id="probe-table">
        <thead>
          <tr>
            <th>Host</th>
            <th>Ping</th>
            <th>Ports</th>
            <th class="hide-mobile">Ping History</th>
          </tr>
        </thead>
        <tbody id="probe-tbody"></tbody>
      </table>
    </section>

  </div>
</main>

<script>
// ---------------------------------------------------------------------------
// Config
// ---------------------------------------------------------------------------
const METRICS_URL    = 'metrics.json';
const REFRESH_SEC    = 30;
const STALE_WARN_SEC = 180;

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function fmtUptime(sec) {
  if (sec == null) return '—';
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function fmtAge(ts) {
  if (!ts) return '—';
  const age = Date.now() / 1000 - ts;
  if (age < 90)  return `${Math.round(age)}s ago`;
  if (age < 3600) return `${Math.round(age/60)}m ago`;
  return `${Math.round(age/3600)}h ago`;
}

function fmtMs(ms) {
  if (ms == null) return '—';
  return `${Math.round(ms)}ms`;
}

function meterColor(pct) {
  if (pct < 60) return 'meter-low';
  if (pct < 85) return 'meter-mid';
  return 'meter-high';
}

function diskColor(pct) {
  if (pct < 70) return '#3fb950';
  if (pct < 85) return '#d29922';
  return '#f85149';
}

function meterHtml(pct) {
  if (pct == null) return '—';
  const cls = meterColor(pct);
  return `<div class="meter"><div class="meter-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div> <span>${pct.toFixed(0)}%</span>`;
}

function portDots(ports) {
  if (!ports || !Object.keys(ports).length) return '—';
  return Object.entries(ports).map(([p, up]) =>
    `<span class="port-dot ${up ? 'port-up' : 'port-down'}" title="Port ${p}: ${up ? 'open' : 'closed'}"></span><span class="port-label">${p}</span>`
  ).join('');
}

function statusBadge(host) {
  if (!host.is_agent) {
    const up = host.ping_ok;
    if (up == null) return `<span class="badge badge-unknown">unknown</span>`;
    return up ? `<span class="badge badge-up">up</span>` : `<span class="badge badge-down">down</span>`;
  }
  if (host.agent_stale) return `<span class="badge badge-warn">stale</span>`;
  if (host.last_seen == null) return `<span class="badge badge-unknown">no data</span>`;
  return `<span class="badge badge-up">up</span>`;
}

// ---------------------------------------------------------------------------
// Sparkline drawing
// ---------------------------------------------------------------------------
function drawSparkline(canvas, data, color, unit) {
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const vals = data.map(d => d.v).filter(v => v != null);
  if (vals.length < 2) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '9px Courier New';
    ctx.fillText('no data', 4, H/2 + 3);
    return;
  }

  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();

  data.forEach((d, i) => {
    if (d.v == null) return;
    const x = (i / (data.length - 1)) * W;
    const y = H - ((d.v - min) / range) * (H - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Latest value label
  const last = vals[vals.length - 1];
  ctx.fillStyle = color;
  ctx.font = '9px Courier New';
  ctx.fillText(`${last.toFixed(0)}${unit}`, 2, 10);
}

// ---------------------------------------------------------------------------
// Row expansion / detail panel
// ---------------------------------------------------------------------------
const expanded = new Set();

function toggleExpand(name) {
  const detailRow = document.getElementById(`detail-${name}`);
  const icon = document.getElementById(`icon-${name}`);
  if (!detailRow) return;
  if (expanded.has(name)) {
    expanded.delete(name);
    detailRow.style.display = 'none';
    icon.classList.remove('open');
  } else {
    expanded.add(name);
    detailRow.style.display = '';
    icon.classList.add('open');
    renderSparklines(name);
  }
}

function renderSparklines(name) {
  const host = window._lastData?.hosts?.find(h => h.name === name);
  if (!host) return;
  const ids = ['spark-cpu-' + name, 'spark-mem-' + name, 'spark-ping-' + name];
  const datasets = [host.history?.cpu, host.history?.mem, host.history?.ping];
  const colors   = ['#58a6ff', '#3fb950', '#bc8cff'];
  const units    = ['%', '%', 'ms'];
  ids.forEach((id, i) => {
    const c = document.getElementById(id);
    if (c && datasets[i]) drawSparklines(c, datasets[i], colors[i], units[i]);
  });
}

function buildDetailPanel(host) {
  const h = host;
  let html = `<div class="detail-panel">`;

  // System info
  if (h.is_agent && h.os) {
    html += `<div class="detail-section">
      <h4>System</h4>
      <table>
        <tr><td>OS</td><td>${h.os.system || '—'} ${h.os.release || ''}</td></tr>
        <tr><td>Arch</td><td>${h.os.machine || '—'}</td></tr>
        <tr><td>Uptime</td><td>${fmtUptime(h.uptime_sec)}</td></tr>
        <tr><td>Load</td><td>${h.load_avg ? h.load_avg.map(v=>v.toFixed(2)).join(' / ') : '—'}</td></tr>
        <tr><td>Last seen</td><td>${fmtAge(h.last_seen)}</td></tr>
      </table>
    </div>`;
  }

  // Disk usage
  if (h.disks && h.disks.length) {
    html += `<div class="detail-section"><h4>Disks</h4>`;
    h.disks.forEach(d => {
      const pct = d.percent || 0;
      html += `<div class="disk-row">
        <div class="disk-path">${d.mount} &mdash; ${d.used_gb}G / ${d.total_gb}G</div>
        <div class="disk-bar-wrap">
          <div class="disk-bar-bg"><div class="disk-bar-fill" style="width:${pct}%;background:${diskColor(pct)}"></div></div>
          <span class="disk-pct">${pct}%</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // History graphs
  if (h.history) {
    html += `<div class="detail-section"><h4>24h History</h4>
      <div style="display:flex;flex-direction:column;gap:8px;">`;
    if (h.history.cpu?.length) {
      html += `<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">CPU %</div>
        <canvas id="spark-cpu-${h.name}" width="200" height="36" class="sparkline" data-type="cpu"></canvas></div>`;
    }
    if (h.history.mem?.length) {
      html += `<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">Memory %</div>
        <canvas id="spark-mem-${h.name}" width="200" height="36" class="sparkline" data-type="mem"></canvas></div>`;
    }
    if (h.history.ping?.length) {
      html += `<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">Ping ms</div>
        <canvas id="spark-ping-${h.name}" width="200" height="36" class="sparkline" data-type="ping"></canvas></div>`;
    }
    html += `</div></div>`;
  }

  html += `</div>`;
  return html;
}

// Renamed to avoid conflict
function drawSparklines(canvas, data, color, unit) {
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const vals = data.map(d => d.v).filter(v => v != null);
  if (vals.length < 2) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '9px Courier New';
    ctx.fillText('no data', 4, H / 2 + 3);
    return;
  }
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  let first = true;
  data.forEach((d, i) => {
    if (d.v == null) return;
    const x = (i / (data.length - 1)) * W;
    const y = H - ((d.v - min) / range) * (H - 6) - 3;
    if (first) { ctx.moveTo(x, y); first = false; }
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  const last = vals[vals.length - 1];
  ctx.fillStyle = color;
  ctx.font = '9px Courier New';
  ctx.fillText(`${last.toFixed(0)}${unit}`, 2, 10);
}

// Inline sparkline canvas for table rows
function inlineSparkHtml(name, type, color) {
  return `<canvas id="row-spark-${type}-${name}" width="80" height="22" class="sparkline"></canvas>`;
}

function renderRowSparks(host) {
  const name = host.name;
  const defs = [
    { id: `row-spark-cpu-${name}`,  data: host.history?.cpu,  color: '#58a6ff', unit: '%'  },
  ];
  defs.forEach(({ id, data, color, unit }) => {
    const c = document.getElementById(id);
    if (c && data && data.length) drawSparklines(c, data, color, unit);
  });
}

// ---------------------------------------------------------------------------
// Render domains
// ---------------------------------------------------------------------------
function renderDomains(domains) {
  const grid = document.getElementById('domain-grid');
  if (!domains || !domains.length) {
    grid.innerHTML = '<span style="color:var(--muted)">No domains configured.</span>';
    return;
  }
  grid.innerHTML = domains.map(d => {
    const ok = d.ok;
    const cls = ok == null ? 'badge-unknown' : ok ? 'badge-up' : 'badge-down';
    const label = ok == null ? 'unknown' : ok ? 'up' : 'DOWN';
    return `<div class="domain-card">
      <div class="domain-name">${d.name}</div>
      <div style="margin:4px 0"><span class="badge ${cls}">${label}</span></div>
      <div class="domain-meta">
        ${d.status_code != null ? `HTTP ${d.status_code}` : 'no response'} &bull;
        ${fmtMs(d.latency_ms)} &bull;
        ${fmtAge(d.last_check)}
      </div>
    </div>`;
  }).join('');
}

// ---------------------------------------------------------------------------
// Render agent hosts
// ---------------------------------------------------------------------------
function renderAgentHosts(hosts) {
  const tbody = document.getElementById('agent-tbody');
  const agentHosts = hosts.filter(h => h.is_agent);
  if (!agentHosts.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="color:var(--muted);text-align:center">No agent hosts yet.</td></tr>';
    return;
  }

  let html = '';
  agentHosts.forEach(h => {
    const rowCls = expanded.has(h.name) ? 'host-row expanded' : 'host-row';
    html += `<tr class="${rowCls}" id="row-${h.name}">
      <td class="host-name-cell" onclick="toggleExpand('${h.name}')">
        <span class="expand-icon ${expanded.has(h.name) ? 'open' : ''}" id="icon-${h.name}">▶</span>${h.name}
      </td>
      <td>${statusBadge(h)}</td>
      <td>${meterHtml(h.cpu_pct)}</td>
      <td>${meterHtml(h.mem_pct)}</td>
      <td class="hide-mobile">${h.load_avg ? h.load_avg[0].toFixed(2) : '—'}</td>
      <td class="hide-mobile">${fmtUptime(h.uptime_sec)}</td>
      <td>${portDots(h.ports)}</td>
      <td class="hide-mobile">${h.ping_ms != null ? fmtMs(h.ping_ms) : (h.ping_ok === false ? '<span style="color:var(--red)">no ping</span>' : '—')}</td>
      <td class="hide-mobile">${inlineSparkHtml(h.name, 'cpu', '#58a6ff')}</td>
    </tr>
    <tr class="detail-row" id="detail-${h.name}" style="display:${expanded.has(h.name) ? '' : 'none'}">
      <td colspan="9">${buildDetailPanel(h)}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  agentHosts.forEach(h => {
    renderRowSparks(h);
    if (expanded.has(h.name)) {
      setTimeout(() => renderSparklines(h.name), 0);
    }
  });
}

// ---------------------------------------------------------------------------
// Render probe-only hosts
// ---------------------------------------------------------------------------
function renderProbeHosts(hosts) {
  const tbody = document.getElementById('probe-tbody');
  const probeHosts = hosts.filter(h => !h.is_agent);
  if (!probeHosts.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center">No probe-only hosts configured.</td></tr>';
    return;
  }

  let html = '';
  probeHosts.forEach(h => {
    const pingCls = h.ping_ok ? 'badge-up' : (h.ping_ok === false ? 'badge-down' : 'badge-unknown');
    const pingLbl = h.ping_ok ? `up ${fmtMs(h.ping_ms)}` : (h.ping_ok === false ? 'no ping' : 'unknown');
    html += `<tr>
      <td>${h.name}</td>
      <td><span class="badge ${pingCls}">${pingLbl}</span></td>
      <td>${portDots(h.ports)}</td>
      <td class="hide-mobile">${inlineSparkHtml(h.name, 'ping', '#bc8cff')}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  probeHosts.forEach(h => {
    const c = document.getElementById(`row-spark-ping-${h.name}`);
    if (c && h.history?.ping?.length) drawSparklines(c, h.history.ping, '#bc8cff', 'ms');
  });
}

// ---------------------------------------------------------------------------
// Overall status summary
// ---------------------------------------------------------------------------
function computeOverall(data) {
  let total = 0, down = 0;
  (data.hosts || []).forEach(h => {
    total++;
    if (h.ping_ok === false) down++;
    if (h.agent_stale) down++;
  });
  (data.domains || []).forEach(d => {
    total++;
    if (d.ok === false) down++;
  });
  return { total, down };
}

// ---------------------------------------------------------------------------
// Main render
// ---------------------------------------------------------------------------
function render(data) {
  window._lastData = data;

  renderDomains(data.domains || []);
  renderAgentHosts(data.hosts || []);
  renderProbeHosts(data.hosts || []);

  const { total, down } = computeOverall(data);
  const el = document.getElementById('overall-status');
  if (down === 0) {
    el.style.color = 'var(--green)';
    el.textContent = `✓ All ${total} up`;
  } else {
    el.style.color = 'var(--red)';
    el.textContent = `✗ ${down} of ${total} issue(s)`;
  }

  const gen = data.generated_at ? new Date(data.generated_at * 1000) : null;
  document.getElementById('last-update').textContent =
    gen ? `Updated ${gen.toLocaleTimeString()}` : '—';
}

// ---------------------------------------------------------------------------
// Fetch loop
// ---------------------------------------------------------------------------
let countdown = REFRESH_SEC;

async function fetchMetrics() {
  try {
    const resp = await fetch(METRICS_URL + '?_=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('content').style.display  = '';
    document.getElementById('error-banner').style.display = 'none';
    render(data);
  } catch (e) {
    const banner = document.getElementById('error-banner');
    banner.style.display = '';
    banner.textContent = `Failed to load metrics: ${e.message}`;
    console.error(e);
  }
  countdown = REFRESH_SEC;
}

function tick() {
  countdown--;
  document.getElementById('refresh-countdown').textContent = `Refresh in ${countdown}s`;
  if (countdown <= 0) fetchMetrics();
}

fetchMetrics();
setInterval(tick, 1000);
</script>
</body>
</html>
