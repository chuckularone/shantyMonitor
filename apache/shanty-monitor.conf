# Shanty Monitor - Apache config snippet
# Add this inside your blog.theshanty.us VirtualHost block,
# or drop in /etc/apache2/conf-available/shanty-monitor.conf
# and enable with: a2enconf shanty-monitor

# Dashboard: static files at /var/www/html/dashboard/
<Directory /var/www/html/dashboard>
    Options -Indexes
    AllowOverride None
    AuthType Basic
    AuthName "Shanty Monitor"
    AuthUserFile /etc/shanty-monitor/.htpasswd
    Require valid-user
</Directory>

# Optional: expose collector API externally through Apache HTTPS
# Agents push direct to 192.168.1.168:2777 internally, so this
# is only needed if you want external API access.
#
# <Location /monitor-api/>
#     ProxyPass        http://127.0.0.1:2777/
#     ProxyPassReverse http://127.0.0.1:2777/
#     AuthType Basic
#     AuthName "Shanty Monitor API"
#     AuthUserFile /etc/shanty-monitor/.htpasswd
#     Require valid-user
# </Location>
